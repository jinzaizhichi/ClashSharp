name: Build and Package Clash#

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download Mihomo Core
      shell: pwsh
      run: |
        # 寻找并执行内核更新脚本
        $script = Get-ChildItem -Path . -Filter "Update-Mihomo.ps1" -Recurse | Select-Object -First 1
        if ($script) {
            pwsh $script.FullName
        } else {
            echo "未找到 Update-Mihomo.ps1 脚本，跳过。"
        }
      continue-on-error: true

    # 【修复步骤 1】动态寻找并还原解决方案中的所有 NuGet 包
    - name: Restore NuGet Packages
      shell: pwsh
      run: |
        $sln = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        if ($sln) {
            echo "自动找到解决方案文件: $($sln.FullName)"
            nuget restore $sln.FullName
        } else {
            echo "未找到 .sln 文件，尝试直接还原项目..."
            dotnet restore
        }

    # 【修复步骤 2】动态寻找主项目并执行发布编译
    - name: Build and Publish App
      shell: pwsh
      run: |
        # 寻找主程序项目（排除 Core 或 Test 目录，优先找名字匹配或最大的项目）
        $csproj = Get-ChildItem -Path . -Filter "*ClashSharp.csproj" -Recurse | Select-Object -First 1
        if (-not $csproj) {
            $csproj = Get-ChildItem -Path . -Filter "*.csproj" -Recurse | Select-Object -First 1
        }
        
        echo "自动确认编译目标项目: $($csproj.FullName)"
        
        dotnet publish $csproj.FullName `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -o ./PublishOutput `
          /p:PublishSingleFile=true `
          /p:PublishTrimmed=false `
          /p:EnableWinUI3ProductionReady=true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClashSharp-Windows-x64
        path: ./PublishOutput/

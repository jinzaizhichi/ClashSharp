name: Build and Package Clash#

on:
  push:
    branches: [ "main", "master", "dev" ] # 增加常见分支兼容
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0 # 完整拉取所有历史和分支

    # 【调试步骤】打印当前目录下的所有文件，看看代码到底被拉到了哪里
    - name: List Files in Workspace
      shell: pwsh
      run: |
        echo "=== 当前工作目录 ==="
        Get-Location
        echo "=== 根目录文件列表 ==="
        Get-ChildItem -Path .
        echo "=== 全盘搜索 .sln 文件 ==="
        Get-ChildItem -Path . -Filter "*.sln" -Recurse -ErrorAction SilentlyContinue

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download Mihomo Core
      shell: pwsh
      run: |
        $script = Get-ChildItem -Path . -Filter "Update-Mihomo.ps1" -Recurse | Select-Object -First 1
        if ($script) {
            pwsh $script.FullName
        } else {
            echo "未找到 Update-Mihomo.ps1 脚本，跳过。"
        }
      continue-on-error: true

    # 【修复版还原】使用通用 msbuild 还原，它对旧/新项目格式混合的解决方案更包容
    - name: Restore NuGet Packages
      shell: pwsh
      run: |
        $sln = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        if ($sln) {
            echo "找到解决方案: $($sln.FullName)，开始还原..."
            msbuild /t:Restore $sln.FullName
        } else {
            throw "致命错误：在整个仓库中都没有找到任何 *.sln 解决方案文件，请检查你的 GitHub 仓库分支内是否有代码！"
        }

    # 【修复版编译】使用更稳定的 MSBuild 编译 WinUI 3 项目
    - name: Build Project
      shell: pwsh
      run: |
        $sln = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /p:OutDir=${{ github.workspace }}\PublishOutput\

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClashSharp-Windows-x64
        path: ${{ github.workspace }}\PublishOutput\

name: Build and Package Clash#

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        repository: 'Water-Run/ClashSharp'
        # 如果依然报错，可以尝试把下面的 'main' 改为 'master' 再试一次
        ref: 'main' 
        submodules: recursive
        fetch-depth: 0

    - name: List Files in Workspace
      shell: pwsh
      run: |
        echo "=== 检查云端根目录文件 ==="
        Get-ChildItem -Path .
        echo "=== 搜索所有的项目文件 ==="
        Get-ChildItem -Path . -Filter "*.csproj" -Recurse

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download Mihomo Core
      shell: pwsh
      run: |
        $script = Get-ChildItem -Path . -Filter "Update-Mihomo.ps1" -Recurse | Select-Object -First 1
        if ($script) { pwsh $script.FullName }
      continue-on-error: true

    # 【改动点 1】直接利用 dotnet restore 自动扫描目录，不再死磕 .sln
    - name: Restore NuGet Packages
      run: dotnet restore

    # 【改动点 2】动态寻找主程序项目并执行发布编译
    - name: Build Project
      shell: pwsh
      run: |
        # 寻找主要的 .csproj 项目文件
        $csproj = Get-ChildItem -Path . -Filter "*ClashSharp.csproj" -Recurse | Select-Object -First 1
        if (-not $csproj) {
            $csproj = Get-ChildItem -Path . -Filter "*.csproj" -Recurse | Select-Object -First 1
        }
        
        if ($csproj) {
            echo "找到目标项目: $($csproj.FullName)，开始编译..."
            dotnet publish $csproj.FullName -c Release -r win-x64 --self-contained true -o ./PublishOutput /p:PublishSingleFile=true /p:PublishTrimmed=false /p:EnableWinUI3ProductionReady=true
        } else {
            throw "致命错误：在整个仓库中既没有 .sln，也没有找到任何 .csproj 项目文件！请确认原仓库是否有源码。"
        }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClashSharp-Windows-x64
        path: ./PublishOutput/

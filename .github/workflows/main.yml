name: Build and Package Clash#

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 【核心修复】这里强行指定拉取原作者的完整源码仓库，解决你 Fork 仓库没有代码的问题
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        repository: 'Water-Run/ClashSharp'
        ref: 'main' # 如果原作者的分支叫 master，这里可以改成 master
        submodules: recursive
        fetch-depth: 0

    - name: List Files in Workspace
      shell: pwsh
      run: |
        echo "=== 根目录文件列表 ==="
        Get-ChildItem -Path .

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download Mihomo Core
      shell: pwsh
      run: |
        $script = Get-ChildItem -Path . -Filter "Update-Mihomo.ps1" -Recurse | Select-Object -First 1
        if ($script) {
            pwsh $script.FullName
        } else {
            echo "未找到 Update-Mihomo.ps1 脚本，跳过。"
        }
      continue-on-error: true

    - name: Restore NuGet Packages
      shell: pwsh
      run: |
        $sln = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        if ($sln) {
            echo "找到解决方案: $($sln.FullName)，开始还原..."
            msbuild /t:Restore $sln.FullName
        } else {
            throw "致命错误：依然没有找到任何 *.sln 文件。"
        }

    - name: Build Project
      shell: pwsh
      run: |
        $sln = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /p:OutDir=${{ github.workspace }}\PublishOutput\

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClashSharp-Windows-x64
        path: ${{ github.workspace }}\PublishOutput\
